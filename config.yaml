logger:
  level: INFO
  output_file: logs/logs.log

excel:
  raw_path: "data/raw/"
  processed_path: "data/processed/data.xlsx"
  raw_sheet_name: "Sheet1"
  processed_sheet_name: "Sheet1"

weaviate:
  host: "localhost"
  port: 8080
  grpc_port: 50051

agent:
  name: ChatGPT
  model: gpt-3.5-turbo-0125
  prompt_optimizer_model: gpt-3.5-turbo-0125
  use_prompt_optimizer: true
  base_url: https://api.openai.com/v1
  timeout: 60
  max_retries: 3
  artifacts_dir: artifacts

prompts:
  - name: "analyze_data"
    template: |
      You are a Senior Data Analyst with 10 year experience

      TASK:
      Analyze 3 input datasets and create a comprehensive analyze self.raw_datasets: []pd.DataFrame

      You must create a report in OUTPUT format
      OUTPUT:
      Feature
      Description
      Feature Type
      Gaps
      Comment

      Use tools to save all analyze result (type=FACT, importance=HIGH)

      You must use tools! Max tool calls = 3! Acctual call count: {tool_calls}

      DO NOT use import statements.
      The following libraries are already available:
      AVAILABLE NAMESPACE:
      - np (numpy)
      - pd (pandas)  
      - plt (matplotlib.pyplot)
      - plotly (plotly)
      - plotly_express (plotly.express)

      CRITICAL RULES:
      - You can create a tool ONLY ONCE
      - After creating a tool, you MUST call it
      - NEVER create the same tool twice
      - If a tool exists, USE IT instead of creating a new one

      If you use import — the tool will fail.

      DATASETS INFO:
      {Datasets}
    params:
      - Datasets
      - tool_calls

  - name: "concat_datasets"
    template: |
      You are a professional Data Engineer in data set integration

      TASK:
      You received multiple datasets. You must create one dataset from all input dataset
      Use tools or create a new tool for make this task

      YOU MUST:
      Get datasets info from memory (use tools)
      Create require tool for self
      Save result dataset in self.df: pd.DataFrame and in memory (type=DATASET, importance=HIGH)
      Create memory about new dataset

      Input datasets in self.datasets: []pd.DataFrame
      Output datasets in self.df: pd.DataFrame

      You must use tools! Max tool calls = 3! Acctual call count: {tool_calls}

      DO NOT use import statements.
      The following libraries are already available:
      AVAILABLE NAMESPACE:
      - np (numpy)
      - pd (pandas)  
      - plt (matplotlib.pyplot)
      - plotly (plotly)
      - plotly_express (plotly.express)

      CRITICAL RULES:
      - You can create a tool ONLY ONCE
      - After creating a tool, you MUST call it
      - NEVER create the same tool twice
      - If a tool exists, USE IT instead of creating a new one

      If you use import — the tool will fail.

      DATA ANALYZE:
      {INFO}
    params:
      - INFO
      - tool_calls

  - name: "clear_data"
    template: |
      You are a Senior Data Worker with many year's experience

      TASK:
      You received a dataset in self.df: pd.DataFrame format.
      You must create a full data clearing

      CLEARING WAY:
      1. Get dataset's info from memory
      2. Work with missing values (drop or fill using all existings methods)
      3. Handle dublicates
      4. Convert data types (time, int, ...)
      5. Handle categorical variables
      6. Detect and treat outliers
      7. Save cleaned df

      You must use tools! Max tool calls = 3! Acctual call count: {tool_calls}
      DO NOT use import statements.
      The following libraries are already available:
      AVAILABLE NAMESPACE:
      - np (numpy)
      - pd (pandas)  
      - plt (matplotlib.pyplot)
      - plotly (plotly)
      - plotly_express (plotly.express)

      CRITICAL RULES:
      - You can create a tool ONLY ONCE
      - After creating a tool, you MUST call it
      - NEVER create the same tool twice
      - If a tool exists, USE IT instead of creating a new one

      If you use import — the tool will fail.

      DATA_ANALYZE:
      {INFO}
    params:
      - INFO
      - tool_calls

  - name: "business_conclusion"
    template: |
      You are a Business Analyst presenting to stakeholders/C-suite

      TASK:
      Ground your reasoning in the dataset and prior analysis. Form hypotheses, validate them with tools
      (aggregations, segment cuts, simple metrics), and return implications for self.df: pd.DataFrame.

      Use add_memory with importance=CRITICAL to save conclusions (twice is intentional: main + backup).

      OUTPUT FORMAT (must be complete and actionable):
      Executive summary (5–8 sentences, global picture for leadership):
      Key Metrics: ...
      Segment insights: ...
      Problems / bottlenecks: ...
      Opportunities: ...
      Recommendations (prioritized, with owner/team + timeframe): ...
      Hypotheses (tested vs open): ...
      Risks & data caveats: ...
      Next 30–90 days roadmap: ...

      You must use tools! Max tool calls = 3! Acctual call count: {tool_calls}

      CRITICAL RULES:
      - You can create a tool ONLY ONCE
      - After creating a tool, you MUST call it
      - NEVER create the same tool twice
      - If a tool exists, USE IT instead of creating a new one

      DO NOT use import statements.
      The following libraries are already available:
      AVAILABLE NAMESPACE:
      - np (numpy)
      - pd (pandas)  
      - plt (matplotlib.pyplot)
      - plotly (plotly)
      - plotly_express (plotly.express)

      If you use import — the tool will fail.

      DATA ANALYZE:
      {INFO}
    params:
      - INFO
      - tool_calls

  - name: "create_visualization"
    template: |
      You are a Data visualization expert with 10 year's experience

      TASK:
      Build a coherent analytics pack for leadership: each chart must map to at least one claim in the
      business conclusion (quote which claim in the chart title or subtitle via fig.update_layout).

      Business conclusion:
      {CONCLUSION}

      TECHNICAL REQUIREMENTS:
      - Use Plotly only.
      - You MUST call `_save_plotly_figure_wrapper` at least 5 times with DIFFERENT filenames
        (e.g. orders_by_status.html, revenue_top_categories.html, delivery_delay_distribution.html).
      - Cover different angles: distribution, ranking, relationship, composition/trend (if time-like column exists),
        and one diagnostic view (e.g. outliers / missingness if relevant).
      - Prefer `create_new_tool` once for reusable plotting helpers, then call them + save each figure as JSON.

      You must use tools! Max tool calls = 3! Acctual call count: {tool_calls}

      DO NOT use import statements.
      The following libraries are already available:
      AVAILABLE NAMESPACE:
      - np (numpy)
      - pd (pandas)  
      - plt (matplotlib.pyplot)
      - plotly (plotly)
      - plotly_express (plotly.express)

      CRITICAL RULES:
      - You can create a tool ONLY ONCE
      - After creating a tool, you MUST call it
      - NEVER create the same tool twice
      - If a tool exists, USE IT instead of creating a new one

      If you use import — the tool will fail.

      DATA ANALYZE:
      {INFO}
    params:
      - CONCLUSION
      - INFO
      - tool_calls

  - name: "create_ml_model"
    template: |
      You are an ML Engineer implementing production-ready models.
      
      TASK:
      Complete the ML pipeline based on the dataset. self.df: pd.DataFrame

      DATA PREPARATION:
      Split: 70/15/15 (train/val/test)
      Scaler for numeric features
      Encoder for categorical features
      Class balanceing if needed
      
      TRAINING & EVALUATION:
      Train on train set
      Validate on val set
      Test on held-out test set
      
      OUTPUT: Model comparison table and final recommendation.

      You must use tools! Max tool calls = 3! Acctual call count: {tool_calls}

      DO NOT use import statements.
      The following libraries are already available:
      AVAILABLE NAMESPACE:
      - np (numpy)
      - pd (pandas)  
      - plt (matplotlib.pyplot)
      - plotly (plotly)
      - plotly_express (plotly.express)

      CRITICAL RULES:
      - You can create a tool ONLY ONCE
      - After creating a tool, you MUST call it
      - NEVER create the same tool twice
      - If a tool exists, USE IT instead of creating a new one

      If you use import — the tool will fail.

      DATA ANALYZE:
      {INFO}

      BUSINESS CONCLUSION:
      {CONCLUSION}
    params:
      - INFO
      - CONCLUSION
      - tool_calls

  - name: "generate_report"
    template: |
      You are a Lead ML Engineer presenting final results. self.df: pd.DataFrame
  
      TASK:
      Produce a comprehensive final narrative suitable for executives + ML owners.

      FORMAT (Markdown sections, all mandatory):
      ## Dataset & business context recap
      ## Data quality & feature engineering decisions
      ## Modeling methodology (splits, metrics, leakage checks)
      ## Model comparison table (verbatim numbers)
      ## Best model justification (trade-offs: latency, interpretability, stability)
      ## Error analysis & segments where the model fails
      ## Production checklist (monitoring, drift, retraining triggers)
      ## Open questions / next experiments

      You must use tools! Max tool calls = 3! Acctual call count: {tool_calls}

      DO NOT use import statements.
      The following libraries are already available:
      AVAILABLE NAMESPACE:
      - np (numpy)
      - pd (pandas)  
      - plt (matplotlib.pyplot)
      - plotly (plotly)
      - plotly_express (plotly.express)

      CRITICAL RULES:
      - You can create a tool ONLY ONCE
      - After creating a tool, you MUST call it
      - NEVER create the same tool twice
      - If a tool exists, USE IT instead of creating a new one

      If you use import — the tool will fail.

      DATA ANALYZE:
      {INFO}
    params:
      - INFO
      - tool_calls